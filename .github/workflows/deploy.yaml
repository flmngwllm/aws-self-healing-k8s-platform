name: Build Images for ArgoCD
on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "remediation-serv/**"
      - "k8s/**"
      - ".github/workflows/deploy.yml"

permissions:
  id-token: write
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with: 
          role-to-assume: ${{ secrets.ACTIONS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build app image
        env:
          ECR_REGISTRY: ${{steps.ecr-login.outputs.registry}}
          ECR_REPOSITORY: self-heal-app
          ECR_IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$ECR_IMAGE_TAG -f app/Dockerfile app 
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$ECR_IMAGE_TAG"
          echo "Docker image pushed: $ECR_IMAGE_TAG pushed to ECR" 
          echo "$ECR_REGISTRY/$ECR_REPOSITORY:$ECR_IMAGE_TAG"

      - name: Build remediation image
        env:
          ECR_REGISTRY: ${{steps.ecr-login.outputs.registry}}
          ECR_REPOSITORY: self-heal-remediation-serv
          ECR_IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$ECR_IMAGE_TAG -f remediation-serv/Dockerfile remediation-serv 
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$ECR_IMAGE_TAG"
          echo "Docker image pushed: $ECR_IMAGE_TAG pushed to ECR" 
          echo "$ECR_REGISTRY/$ECR_REPOSITORY:$ECR_IMAGE_TAG"

      - name: update manifests
        run: |
          sed -i "s|image: .*self-heal-app:.*|image: ${{ steps.ecr-login.outputs.registry }}/self-heal-app:${{ github.sha }}|g" k8s/app/deployment.yaml
          sed -i "s|image: .*self-heal-remediation-serv:.*|image: ${{ steps.ecr-login.outputs.registry }}/self-heal-remediation-serv:${{ github.sha }}|g" k8s/remediation/deployment.yaml
        
      - name: Commit manifest updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/app/deployment.yaml k8s/remediation/deployment.yaml
          git commit -m "Update image tags in manifests for commit ${{ github.sha }}" || echo "No changes to commit"
          git push 
      
      

