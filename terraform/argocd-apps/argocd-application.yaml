apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: self-heal-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/flmngwllm/aws-self-healing-k8s-platform
    targetRevision: main
    path: k8s
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true