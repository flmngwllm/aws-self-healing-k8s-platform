apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-heal-app-deployment
  labels:
    app: self-heal-app
spec:
  replicas: 2
  selector: 
    matchLabels: 
      app: self-heal-app
  template:
    metadata:
      labels:
        app: self-heal-app
    spec:
      containers:
      - name: self-heal-app
        image: 831274730062.dkr.ecr.us-east-1.amazonaws.com/self-heal-app:499cb02239e9dcd8fd94e869ff7ab669cceaec72
        ports:
        - containerPort: 8000
