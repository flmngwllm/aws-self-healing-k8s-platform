apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-heal-app-deployment
  labels:
    app: self-heal-app
spec:
  replicas: 2
  selector: 
    matchLabels: 
      app: self-heal-app
  template:
    metadata:
      labels:
        app: self-heal-app
    spec:
      containers:
      - name: self-heal-app
        image: 831274730062.dkr.ecr.us-east-1.amazonaws.com/self-heal-app:9662038ba9b048590cfd8eac65c56c0b4e6f18c2
        ports:
        - containerPort: 8000
