apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-heal-app-deployment
  labels:
    app: self-heal-app
spec:
  replicas: 2
  selector: 
    matchLabels: 
      app: self-heal-app
  template:
    metadata:
      labels:
        app: self-heal-app
    spec:
      containers:
      - name: self-heal-app
        image: 831274730062.dkr.ecr.us-east-1.amazonaws.com/self-heal-app:25f2fc75d70d40ba2d0ef815d7e406c44460ea76
        ports:
        - containerPort: 8000
