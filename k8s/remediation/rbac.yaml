apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: remediation-serv-role
  namespace: default

rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs:
      - get
      - list
      - patch

  - apiGroups: [""]
    resources: ["pods"]
    verbs:
      - get
      - list
      - delete

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: remediation-serv-rolebinding
  namespace: default

subjects:
  - kind: ServiceAccount
    name: remediation-serv-sa
    namespace: default

roleRef:
  kind: Role
  name: remediation-serv-role
  apiGroup: rbac.authorization.k8s.io